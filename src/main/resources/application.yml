spring:
  application:
    name: finCore
  profiles:
    default: local
  config:
    import: optional:file:./application-local.yml
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/fin_core?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:fincore}
    password: ${DB_PASSWORD:fincore}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 3s
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.hibernate.SQL: ${SQL_LOG_LEVEL:debug}
    org.hibernate.orm.jdbc.bind: ${SQL_BIND_LOG_LEVEL:trace}
