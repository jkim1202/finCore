spring:
  datasource:
    url: jdbc:mysql://localhost:3306/fin_core?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: fincore
    password: fincore
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

security:
  jwt:
    secret: change-this-access-token-secret-at-least-32-bytes
    refresh-secret: change-this-refresh-token-secret-at-least-32-bytes
    access-exp-minutes: 30
    refresh-exp-days: 14

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
